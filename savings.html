<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Pesa Poa — Akiba (Savings)</title>
<style>
  :root{
    --paper:#F8F9FA; --card:#FEFEFE; --ink:#343A40; --ink-soft:#6C757D; --line:#E9ECEF;
    --green:#40916C; --green-deep:#1E4D35; --green-tint:#D8F3DC;
    --coral:#E63946; --coral-tint:#FEE2E2; --yellow:#E9C46A; --teal:#C2410C; --teal-deep:#9A3412;
    --shadow:0 2px 12px rgba(0,0,0,.08);
    --r:14px; --rs:8px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:Arial,sans-serif;background:var(--paper);color:var(--ink);-webkit-text-size-adjust:100%;line-height:1.45}
  .wrap{max-width:560px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column}

  .hud{position:sticky;top:0;z-index:10;background:var(--teal-deep);color:#fff;padding:8px 12px 10px;box-shadow:0 2px 8px rgba(0,0,0,.2)}
  .hud-top{display:flex;justify-content:space-between;align-items:center;padding-bottom:8px;margin-bottom:8px;border-bottom:1px solid rgba(255,255,255,.2)}
  .hud-brand{display:flex;align-items:center;gap:6px;font-weight:900;letter-spacing:.01em;font-size:15px;color:#fff;text-decoration:none}
  .hud-brand b{color:var(--yellow)}
  .hud-logo{width:20px;height:20px;display:block}
  .langbtn{background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.5);color:#fff;border-radius:999px;font:inherit;font-weight:700;font-size:11px;letter-spacing:.04em;padding:5px 11px;cursor:pointer;transition:background .15s ease}
  .langbtn:hover{background:rgba(255,255,255,.22)}
  .hud-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
  .hud-item{text-align:center;line-height:1.1}
  .hud-label{font-size:11px;text-transform:uppercase;letter-spacing:.06em;opacity:.85}
  .hud-val{font-size:18px;font-weight:700;font-variant-numeric:tabular-nums;margin-top:2px}
  .hud-item.debt .hud-val{color:#FEE2E2}

  .progress{height:6px;background:rgba(255,255,255,.25);margin:8px -12px -10px}
  .progress-fill{height:100%;background:var(--yellow);width:0;transition:width .4s ease}

  .stage{flex:1;padding:18px 16px 28px;display:flex;flex-direction:column}
  .eyebrow{font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--teal);margin:0 0 8px}
  .scene{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:18px;box-shadow:var(--shadow)}
  .scene h2{margin:0 0 10px;font-size:21px;line-height:1.25;font-weight:700}
  .scene p{margin:0 0 14px;color:var(--ink-soft);font-size:16px}

  .options{display:flex;flex-direction:column;gap:10px}
  .opt{width:100%;text-align:left;cursor:pointer;background:#fff;border:1px solid var(--line);border-radius:var(--rs);padding:14px;font:inherit;color:var(--ink);display:flex;justify-content:space-between;align-items:center;gap:12px;transition:border-color .15s ease,background .15s ease}
  .opt:hover{border-color:var(--teal);background:#FFF7ED}
  .opt:focus-visible{outline:2px solid var(--teal);outline-offset:2px}
  .opt-main{font-weight:700;font-size:16px}
  .opt-sub{font-size:13px;color:var(--ink-soft);margin-top:2px;font-weight:500}
  .opt-cost{font-weight:700;white-space:nowrap;font-variant-numeric:tabular-nums}
  .opt-cost.spend{color:var(--coral)}
  .opt-cost.earn{color:var(--green)}
  .opt-cost.free{color:var(--ink-soft)}

  .tool{margin-top:6px}
  .tool-row{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:6px}
  .tool-big{font-size:34px;font-weight:700;color:var(--teal-deep);font-variant-numeric:tabular-nums}
  input[type=range]{width:100%;accent-color:var(--teal);height:34px}
  .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:14px}
  .stat{background:var(--green-tint);border-radius:var(--r);padding:10px;text-align:center}
  .stat .n{font-size:20px;font-weight:700;color:var(--green-deep);font-variant-numeric:tabular-nums}
  .stat .l{font-size:11px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.04em;margin-top:2px}

  .verdict{border-radius:var(--r);padding:16px;border:1px solid;animation:rise .35s ease}
  @keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  @media (prefers-reduced-motion: reduce){.verdict{animation:none}}
  .verdict.good{background:var(--green-tint);border-color:var(--green)}
  .verdict.bad{background:var(--coral-tint);border-color:var(--coral)}
  .verdict.neutral{background:#FEF3C7;border-color:var(--yellow)}
  .verdict h3{margin:0 0 6px;font-size:17px;font-weight:700}
  .verdict .later{font-weight:700;font-size:13px;text-transform:uppercase;letter-spacing:.05em;opacity:.7;margin:10px 0 2px}
  .verdict p{margin:0 0 8px;font-size:15px;color:var(--ink)}
  .lesson{display:flex;gap:8px;align-items:flex-start;background:rgba(255,255,255,.6);border-radius:var(--rs);padding:10px;margin-top:6px;font-size:14px}
  .lesson b{color:var(--teal-deep)}
  .delta-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}
  .tag{font-size:13px;font-weight:700;padding:5px 10px;border-radius:999px;font-variant-numeric:tabular-nums}
  .tag.spend{background:#FEE2E2;color:#991B1B}
  .tag.earn{background:#D8F3DC;color:#1E4D35}
  .tag.save{background:#FFEDD5;color:#C2410C}
  .tag.pts{background:#FEF3C7;color:#92400E}

  .btn{display:block;width:100%;margin-top:16px;cursor:pointer;background:var(--teal);color:#fff;border:none;border-radius:var(--rs);padding:16px;font:inherit;font-weight:700;font-size:17px;transition:background .15s ease,transform .15s ease}
  .btn:hover{background:var(--teal-deep);transform:translateY(-1px)}
  .btn:focus-visible{outline:2px solid var(--green);outline-offset:2px}
  .btn.ghost{background:#fff;color:var(--teal-deep);border:1px solid var(--teal)}

  .center{flex:1;display:flex;flex-direction:column;justify-content:center;text-align:center;padding:24px 8px}
  .startbar{display:flex;justify-content:flex-end;padding:10px 12px 0}
  .tagline{color:var(--ink-soft);font-size:16px;margin:10px 0 22px}
  .back-btn{display:inline-block;color:var(--ink-soft);font:inherit;font-weight:700;font-size:13px;text-decoration:none;margin:0 0 18px}
  .back-btn:hover{color:var(--teal-deep)}
  .start-logo{width:48px;height:48px;display:block;margin:0 auto 12px}
  .game-title{font-size:28px;font-weight:800;letter-spacing:-.01em;color:var(--teal-deep);margin:0 0 16px}
  .brief{text-align:left;width:100%;margin:0 0 22px;padding:20px;list-style:none;background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow)}
  .brief li{position:relative;padding-left:20px;margin-bottom:10px;color:var(--ink-soft);font-size:15px}
  .brief li:last-child{margin-bottom:0}
  .brief li::before{content:"";position:absolute;left:0;top:7px;width:7px;height:7px;border-radius:50%;background:var(--teal)}
  .brief li b{color:var(--ink)}
  .end-score{font-size:56px;font-weight:700;color:var(--teal-deep);line-height:1;margin:4px 0;font-variant-numeric:tabular-nums}
  .badge{display:inline-block;background:var(--yellow);color:#92400E;font-weight:700;padding:8px 16px;border-radius:999px;margin-bottom:14px}
  .recap{text-align:left;background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:14px;margin-top:14px}
  .recap h4{margin:0 0 8px;font-size:14px;text-transform:uppercase;letter-spacing:.05em;color:var(--teal)}
  .recap li{margin-bottom:7px;font-size:14px;color:var(--ink-soft)}
  .money-line{display:flex;justify-content:space-between;font-size:15px;padding:7px 0;border-bottom:1px dashed var(--line)}
  .money-line:last-child{border:none;font-weight:700}
  .foot{text-align:center;font-size:12px;color:var(--ink-soft);padding:14px}
  .langbtn.light{background:#fff;border:1px solid var(--teal);color:var(--teal-deep)}
</style>
<script>window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };</script>

/* ---------- State & helpers ---------- */
let LANG = "en";
let state = { screen:"start", i:0, money:START_MONEY, savings:0, points:0, hadDebt:false, deck:[] };
const KSh = n => (n<0?"-":"")+"KSh "+Math.abs(Math.round(n)).toLocaleString("en-KE");
const app = document.getElementById("app");
function t(v){ return (v && typeof v==="object" && ("en" in v)) ? (v[LANG]!=null?v[LANG]:v.en) : v; }
function ui(k){ return (L[LANG][k]!=null?L[LANG][k]:L.en[k]); }
function fmt(s,o){ return String(s).replace(/\{(\w+)\}/g,(_,k)=> (o[k]!=null?o[k]:"")); }

function loadBest(){ try{ return parseInt(localStorage.getItem("pesa_akiba_best")||"0",10)||0; }catch(e){ return 0; } }
function saveBest(v){ try{ localStorage.setItem("pesa_akiba_best",String(v)); }catch(e){} }
function loadLang(){ try{ const v=localStorage.getItem("pesa_lang"); if(v==="en"||v==="sw") LANG=v; }catch(e){} }
function saveLang(){ try{ localStorage.setItem("pesa_lang",LANG); }catch(e){} }

function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function buildDeck(){
  const anchors = POOL.filter(s=>s.anchor);
  const rest = shuffle(POOL.filter(s=>!s.anchor)).slice(0, ROUNDS - anchors.length);
  return anchors.concat(rest).sort((a,b)=>a.order-b.order);
}

function bindLang(){
  const b=document.getElementById("lang");
  if(b) b.onclick=()=>{ LANG = LANG==="en"?"sw":"en"; saveLang(); repaint(); };
}
function langLabel(){ return LANG==="en" ? "KISWAHILI" : "ENGLISH"; }
function repaint(){
  if(state.screen==="start") startScreen();
  else if(state.screen==="end") endScreen();
  else render();
}

/* ---------- Screens ---------- */
function startScreen(){
  state.screen="start";
  const best=loadBest();
  app.innerHTML = `
    <div class="stage center">
      <a class="back-btn" href="index.html">← Back</a>
      <img class="start-logo" src="logo/sunset_trans_mini_2.png" alt="">
      <h1 class="game-title">${ui("gameTitle")}</h1>
      <ul class="brief">
        <li>${ui("briefDesc")}</li>
        <li>${fmt(ui("startMoney"),{m:KSh(START_MONEY)})}</li>
        <li>${ui("briefGoal")}</li>
        ${best?`<li>${ui("best")} <b>${best}</b></li>`:""}
      </ul>
      <button class="btn" id="go">${ui("start")}</button>
    </div>`;
  document.getElementById("go").onclick=()=>{
    state={ screen:"play", i:0, money:START_MONEY, savings:0, points:0, hadDebt:false, deck:buildDeck() };
    render(); window.scrollTo(0,0);
  };
}

function hud(){
  const debt=state.money<0;
  return `
  <div class="hud">
    <div class="hud-top">
      <a class="hud-brand" href="index.html"><img class="hud-logo" src="logo/sunset_trans_mini_2.png" alt="">Pesa <b>Poa</b></a>
      <button id="lang" class="langbtn">${langLabel()}</button>
    </div>
    <div class="hud-stats">
      <div class="hud-item ${debt?"debt":""}"><div class="hud-label">${debt?ui("hudDebt"):ui("hudMoney")}</div><div class="hud-val">${KSh(state.money)}</div></div>
      <div class="hud-item"><div class="hud-label">${ui("hudSaved")}</div><div class="hud-val">${KSh(state.savings)}</div></div>
      <div class="hud-item"><div class="hud-label">${ui("hudPts")}</div><div class="hud-val">${state.points}</div></div>
    </div>
    <div class="progress"><div class="progress-fill" style="width:${(state.i/state.deck.length)*100}%"></div></div>
  </div>`;
}

function render(){
  state.screen="play";
  if(state.i>=state.deck.length) return endScreen();
  const s=state.deck[state.i];
  app.innerHTML = hud() + `<div class="stage" id="stage"></div>`;
  bindLang();
  const stage=document.getElementById("stage");
  if(s.type==="choice") renderChoice(stage,s);
  else if(s.type==="reveal") renderReveal(stage,s);
  else if(s.type==="slider") renderSlider(stage,s);
}

function costTag(o){
  if(o.cost>0) return `<span class="opt-cost spend">−${o.cost.toLocaleString()}</span>`;
  if(o.money>0) return `<span class="opt-cost earn">+${o.money.toLocaleString()}</span>`;
  return `<span class="opt-cost free">${ui("free")}</span>`;
}
function renderChoice(stage,s){
  stage.innerHTML = `
    <p class="eyebrow">${t(s.eyebrow)}</p>
    <div class="scene">
      <h2>${t(s.title)}</h2><p>${t(s.text)}</p>
      <div class="options">
        ${s.options.map((o,i)=>`<button class="opt" data-i="${i}">
          <span><span class="opt-main">${t(o.main)}</span><br><span class="opt-sub">${t(o.sub)}</span></span>
          ${costTag(o)}</button>`).join("")}
      </div>
    </div>`;
  stage.querySelectorAll(".opt").forEach(b=> b.onclick=()=>choose(s, s.options[+b.dataset.i]));
}
function choose(s,o){
  if(o.money) state.money += o.money;
  if(o.savings){ state.savings += o.savings; if(o.savings>0) state.money -= o.savings; }
  if(o.debt || state.money<0) state.hadDebt=true;
  state.points += (o.points||0);
  const tags=[];
  if(o.money<0) tags.push(`<span class="tag spend">${KSh(o.money)}</span>`);
  if(o.money>0) tags.push(`<span class="tag earn">+${KSh(o.money)}</span>`);
  if(o.savings>0) tags.push(`<span class="tag save">${fmt(ui("tagSaved"),{m:KSh(o.savings)})}</span>`);
  if(o.savings<0) tags.push(`<span class="tag spend">${fmt(ui("tagUsed"),{m:KSh(Math.abs(o.savings))})}</span>`);
  if(o.points) tags.push(`<span class="tag pts">${fmt(ui("tagAkili"),{p:o.points})}</span>`);
  showFeedback(s, o.verdict, t(o.later), t(o.result), t(o.lesson), tags);
}

function renderReveal(stage,s){
  stage.innerHTML = `
    <p class="eyebrow">${t(s.eyebrow)}</p>
    <div class="scene">
      <h2>${t(s.title)}</h2><p>${t(s.text)}</p>
      <div class="options">
        ${s.guesses.map((g,i)=>`<button class="opt" data-i="${i}"><span class="opt-main">${fmt(ui("guessLabel"),{n:g.toLocaleString()})}</span></button>`).join("")}
      </div>
    </div>`;
  stage.querySelectorAll(".opt").forEach(b=> b.onclick=()=>revealProfit(s,+b.dataset.i));
}
function revealProfit(s,idx){
  const right = idx===s.correctIndex;
  state.money += s.moneyOnRun;
  const pts = right ? s.points : Math.round(s.points*0.4);
  state.points += pts;
  const rows = s.breakdown.map(r=>`<div class="money-line"><span>${t(r.label)}</span><span style="color:${r.val<0?'var(--coral)':'var(--green-deep)'};font-weight:700">${KSh(r.val)}</span></div>`).join("");
  const intro = `<p>${right?ui("revealYouSaw"):ui("revealMost")} ${ui("revealIntro")}</p>${rows}
                 <div class="money-line"><span>${ui("realProfit")}</span><span style="color:var(--teal-deep)">${KSh(s.realProfit)}</span></div>`;
  const tags = [`<span class="tag earn">${fmt(ui("tagProfit"),{m:KSh(s.realProfit)})}</span>`,`<span class="tag pts">${fmt(ui("tagAkili"),{p:pts})}</span>`];
  const head = right ? fmt(ui("revealRight"),{p:KSh(s.realProfit)}) : ui("revealWrong");
  showFeedback(s, right?"good":"neutral", ui("revealLater"), intro, t(s.lesson), tags, head);
}

function renderSlider(stage,s){
  stage.innerHTML = `
    <p class="eyebrow">${t(s.eyebrow)}</p>
    <div class="scene">
      <h2>${t(s.title)}</h2><p>${t(s.text)}</p>
      <div class="tool">
        <div class="tool-row"><span style="font-weight:700">${ui("perDay")}</span><span class="tool-big" id="pd"></span></div>
        <input type="range" id="rng" min="${s.min}" max="${s.max}" step="${s.step}" value="${s.start}">
        <div class="grid3">
          <div class="stat"><div class="n" id="w"></div><div class="l">${ui("inWeek")}</div></div>
          <div class="stat"><div class="n" id="m"></div><div class="l">${ui("inMonth")}</div></div>
          <div class="stat"><div class="n" id="y"></div><div class="l">${ui("inYear")}</div></div>
        </div>
      </div>
      <button class="btn" id="next">${ui("sliderBtn")}</button>
    </div>`;
  const rng=document.getElementById("rng");
  const upd=()=>{ const d=+rng.value;
    document.getElementById("pd").textContent="KSh "+d;
    document.getElementById("w").textContent=(d*7).toLocaleString();
    document.getElementById("m").textContent=(d*30).toLocaleString();
    document.getElementById("y").textContent=(d*365).toLocaleString();
  };
  rng.oninput=upd; upd();
  document.getElementById("next").onclick=()=>{
    const d=+rng.value; state.points+=s.points;
    const tags=[`<span class="tag pts">${fmt(ui("tagAkili"),{p:s.points})}</span>`];
    showFeedback(s,"good",ui("sliderLater"), fmt(ui("sliderBody"),{d:d,y:KSh(d*365)}), t(s.lesson), tags, ui("sliderHead"));
  };
}

function showFeedback(s, verdict, laterLabel, resultHTML, lesson, tags, headOverride){
  render_stat_only();
  const head = headOverride || (verdict==="good"?ui("vGood"):verdict==="bad"?ui("vBad"):ui("vNeutral"));
  const last = state.i+1>=state.deck.length;
  app.querySelector(".stage").innerHTML = `
    <p class="eyebrow">${t(s.eyebrow)}</p>
    <div class="feedback">
      <div class="verdict ${verdict}">
        <h3>${head}</h3>
        <div class="later">${laterLabel}</div>
        <p>${resultHTML}</p>
        <div class="lesson">💡 <span><b>${ui("lesson")}</b> ${lesson}</span></div>
        <div class="delta-tags">${tags.join("")}</div>
      </div>
      <button class="btn" id="next">${last?ui("seeResults"):ui("next")}</button>
    </div>`;
  document.getElementById("next").onclick=()=>{ state.i++; render(); window.scrollTo(0,0); };
}
function render_stat_only(){
  const hudEl = app.querySelector(".hud");
  if(hudEl) hudEl.outerHTML = hud();
  bindLang();
}

function endScreen(){
  state.screen="end";
  const total=state.points;
  const best=Math.max(loadBest(),total); saveBest(best);
  let badge,msg;
  if(state.hadDebt||state.money<0){ badge=ui("badgeDebt"); msg=ui("msgDebt"); }
  else if(total>=150){ badge=ui("badgePro"); msg=ui("msgPro"); }
  else if(total>=105){ badge=ui("badgeSaver"); msg=ui("msgSaver"); }
  else { badge=ui("badgeGrow"); msg=ui("msgGrow"); }
  const scoreLabel = ui("score");
  app.innerHTML = `
    <div class="startbar"><button id="lang" class="langbtn light">${langLabel()}</button></div>
    <div class="stage center">
      <p class="eyebrow">${ui("endEyebrow")}</p>
      <p style="margin:0;color:var(--ink-soft)">${scoreLabel}</p>
      <div class="end-score">${total}</div>
      <div class="badge">${badge}</div>
      <p class="tagline" style="margin-top:0">${msg}</p>
      <div class="recap">
        <div class="money-line"><span>${ui("moneyLeft")}</span><span style="color:${state.money<0?'var(--coral)':'var(--green-deep)'};font-weight:800">${KSh(state.money)}</span></div>
        <div class="money-line"><span>${ui("savedUp")}</span><span style="color:var(--teal);font-weight:800">${KSh(state.savings)}</span></div>
        <div class="money-line"><span>${ui("totalWorth")}</span><span>${KSh(state.money+state.savings)}</span></div>
      </div>
      <div class="recap">
        <h4>${ui("remember")}</h4>
        <ul style="margin:0;padding-left:18px">
          <li>${ui("r1")}</li><li>${ui("r2")}</li><li>${ui("r3")}</li>
        </ul>
      </div>
      <button class="btn" id="again">${ui("playAgain")}</button>
      <button class="btn ghost" id="home">${ui("backStart")}</button>
      <p class="foot">${ui("best")} <b>${best}</b></p>
    </div>`;
  bindLang();
  document.getElementById("again").onclick=()=>{
    state={ screen:"play", i:0, money:START_MONEY, savings:0, points:0, hadDebt:false, deck:buildDeck() };
    render(); window.scrollTo(0,0);
  };
  document.getElementById("home").onclick=startScreen;
}

/* boot */
loadLang();
startScreen();
</script>
</body>
</html>
