<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Pesa Poa — Money Smarts</title>
<meta name="description" content="Free, offline money games for Kenyan secondary students. Budget, save, borrow and start a business — one real decision at a time.">
<style>
  :root{
    --paper:#F8F9FA; --card:#FEFEFE; --ink:#343A40; --ink-soft:#6C757D; --line:#E9ECEF;
    --green:#40916C; --green-deep:#1E4D35; --green-tint:#D8F3DC;
    --coral:#E63946; --coral-tint:#FEE2E2; --yellow:#E9C46A; --teal:#1E40AF;
    --shadow:0 2px 12px rgba(0,0,0,.08);
    --r:14px; --rs:8px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:Arial,sans-serif;background:var(--paper);color:var(--ink);-webkit-text-size-adjust:100%;line-height:1.45}
  .wrap{max-width:560px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column}

  .hero{position:relative;background:var(--paper);padding:44px 20px 32px;text-align:center}
  .langbtn{position:absolute;top:16px;right:16px;z-index:2;background:var(--card);border:1px solid var(--green);color:var(--green-deep);border-radius:999px;font:inherit;font-weight:700;font-size:11px;letter-spacing:.04em;padding:6px 12px;cursor:pointer;transition:background .15s ease}
  .langbtn:hover{background:var(--green-tint)}
  .hero-logo-ring{width:84px;height:84px;margin:0 auto 14px;background:var(--line);border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow)}
  .hero-logo{width:62px;height:62px;display:block}
  .logo{font-size:32px;font-weight:800;letter-spacing:-.02em;color:var(--green-deep);margin:0}
  .logo span{color:var(--yellow)}
  .tagline{color:var(--ink-soft);font-size:16px;margin:10px auto 0;max-width:320px}

  .stage{flex:1;padding:22px 16px 28px;display:flex;flex-direction:column}

  .games{display:flex;flex-direction:column;gap:14px}
  .game{background:var(--card);border:1px solid var(--line);border-left:4px solid var(--green);border-radius:var(--r);padding:16px;box-shadow:var(--shadow);display:flex;gap:14px;align-items:center;text-decoration:none;color:inherit;transition:transform .15s ease,box-shadow .15s ease}
  .game:not(.disabled):hover{transform:translateY(-3px);box-shadow:0 12px 26px rgba(30,77,53,.14)}
  .game:not(.disabled):focus-visible{outline:2px solid var(--green);outline-offset:2px}
  .game.c-coral{border-left-color:var(--coral)}
  .game.c-teal{border-left-color:var(--teal)}
  .game.c-yellow{border-left-color:var(--yellow)}
  .game.disabled{border-left-color:var(--line);opacity:.65}
  .gicon{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex:none;background:var(--green-tint)}
  .gicon.c-coral{background:var(--coral-tint)}
  .gicon.c-teal{background:#DBEAFE}
  .gicon.c-yellow{background:#FEF3C7}
  .game-body{flex:1;min-width:0}
  .game h3{margin:0 0 4px;font-size:17px;font-weight:700}
  .game p{margin:0;font-size:14px;color:var(--ink-soft)}
  .game-cta{margin-top:10px;display:flex;align-items:center;gap:10px}
  .tag-soon{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;background:var(--paper);border:1px solid var(--line);color:var(--ink-soft);padding:4px 9px;border-radius:999px}
  .play{display:inline-flex;align-items:center;gap:6px;background:var(--green);color:#fff;border-radius:var(--rs);padding:9px 14px;font:inherit;font-weight:700;font-size:14px}

  .lede{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:18px;box-shadow:var(--shadow);margin-top:22px}
  .lede p{margin:0;font-size:15.5px;color:var(--ink-soft)}
  .lede p+p{margin-top:10px}
  .lede b{color:var(--ink)}

  .support{margin-top:26px;background:linear-gradient(135deg,var(--green-deep),var(--green));border:none;border-radius:var(--r);padding:24px;box-shadow:var(--shadow)}
  .support h3{margin:0 0 8px;font-size:19px;color:#fff;font-weight:700}
  .support p{margin:0;font-size:15px;color:rgba(255,255,255,.92)}
  .btn{display:block;width:100%;margin-top:16px;cursor:pointer;background:#fff;color:var(--green-deep);text-decoration:none;text-align:center;border:none;border-radius:var(--rs);padding:15px;font:inherit;font-weight:700;font-size:16px;transition:background .15s ease,transform .15s ease}
  .btn:hover{background:var(--yellow);transform:translateY(-1px)}

  .foot{text-align:center;font-size:12px;color:var(--ink-soft);padding:22px 14px 6px}
</style>
</head>
<body>
<div class="wrap" id="app"></div>

<script>
const L = {
 en:{
  brand:"Pesa <span>Poa</span> Games", langBtn:"KISWAHILI",
  tagline:"Free games to manage your finance better.",
  lede1:"<b>Pesa Poa</b> (\"money is cool\" in Kiswahili) is a set of free games that put you inside real money decisions — a market stall, a boda fare, a cousin asking to borrow, a bill that shows up once a year.",
  lede2:"Every round is short. Every choice has a consequence you can see. No internet needed, nothing to install, no data leaves the device — just play, on a phone or a shared school computer.",
  g1t:"Money Basics", g1d:"Manage a month of real income and expenses, and see exactly where the money goes.",
  g2t:"Loans &amp; Borrowing", g2d:"When borrowing helps, when it traps you, and how interest actually works.",
  g3t:"Savings", g3d:"Small amounts, saved often, add up to real money — and real options later.",
  g4t:"Starting a Business", g4d:"Turn a small idea into a stall that makes real profit, after every cost.",
  play:"Play", soon:"Coming soon",
  supportH:"Enjoyed the games?", 
  supportP:"Pesa Poa is built for school on Lake Victoria — Wasamo Girls Secondary School on Mfangano Island.  If these games were useful to you, a small gift to the school goes a long way.",
  supportBtn:"Support the school →",
  foot:"Free. Offline. No ads, no data collected."
 },
 sw:{
  brand:"Pesa <span>Poa</span> Michezo", langBtn:"ENGLISH",
  tagline:"Michezo ya bure ya kudhibiti pesa yako vizuri zaidi.",
  lede1:"<b>Pesa Poa</b> ni mfululizo wa michezo ya bure inayokuweka ndani ya maamuzi halisi ya pesa — kibanda sokoni, nauli ya boda, binamu anayeomba mkopo, bili inayotokea mara moja kwa mwaka.",
  lede2:"Kila raundi ni fupi. Kila chaguo lina matokeo unayoyaona. Hauhitaji intaneti, hakuna cha kusakinisha, hakuna data inayotoka kwenye kifaa — cheza tu, kwenye simu au kompyuta ya shule.",
  g1t:"Misingi ya Pesa", g1d:"Simamia mapato na matumizi ya mwezi mzima, na uone hasa pesa zinakoenda.",
  g2t:"Mikopo na Kukopa", g2d:"Wakati kukopa kunasaidia, wakati kunanasa, na jinsi riba inavyofanya kazi kweli.",
  g3t:"Akiba", g3d:"Kiasi kidogo, kikiwekwa mara kwa mara, kinakuwa pesa halisi — na chaguo halisi baadaye.",
  g4t:"Kuanzisha Biashara", g4d:"Geuza wazo dogo kuwa kibanda kinachopata faida halisi, baada ya kila gharama.",
  play:"Cheza", soon:"Inakuja hivi karibuni",
  supportH:"Umefurahia michezo?",
  supportP:"Pesa Poa imejengwa kwa ajili ya shule mbili karibu na Ziwa Victoria — Wasamo Secondary Girls School kisiwa cha Mfangano, na Centre of Hope kisiwa cha Rusinga. Ikiwa michezo hii imekusaidia, zawadi ndogo kwa shule ina maana kubwa.",
  supportBtn:"Saidia Shule →",
  foot:"Bure. Bila intaneti. Hakuna matangazo, hakuna data inayokusanywa."
 }
};

let LANG = "en";
function loadLang(){ try{ const v=localStorage.getItem("pesa_lang"); if(v==="en"||v==="sw") LANG=v; }catch(e){} }
function saveLang(){ try{ localStorage.setItem("pesa_lang",LANG); }catch(e){} }
function t(k){ return L[LANG][k]; }

function render(){
  const app = document.getElementById("app");
  app.innerHTML = `
    <div class="hero">
      <button id="lang" class="langbtn">${t("langBtn")}</button>
      <div class="hero-logo-ring"><img class="hero-logo" src="logo/sunset_trans_mini_2.png" alt=""></div>
      <p class="logo">${t("brand")}</p>
      <p class="tagline">${t("tagline")}</p>
    </div>
    <div class="stage">

      <div class="games">

        <a class="game" href="apps/household.html">
          <span class="gicon">💰</span>
          <div class="game-body">
            <h3>${t("g1t")}</h3>
            <p>${t("g1d")}</p>
            <div class="game-cta"><span class="play">${t("play")} →</span></div>
          </div>
        </a>

        <a class="game c-teal" href="apps/savings.html">
          <span class="gicon c-teal">🏦</span>
          <div class="game-body">
            <h3>${t("g3t")}</h3>
            <p>${t("g3d")}</p>
            <div class="game-cta"><span class="play">${t("play")} →</span></div>
          </div>
        </a>

        <div class="game disabled c-coral">
          <span class="gicon c-coral">🤝</span>
          <div class="game-body">
            <h3>${t("g2t")}</h3>
            <p>${t("g2d")}</p>
            <div class="game-cta"><span class="tag-soon">${t("soon")}</span></div>
          </div>
        </div>

        <div class="game disabled c-yellow">
          <span class="gicon c-yellow">🏪</span>
          <div class="game-body">
            <h3>${t("g4t")}</h3>
            <p>${t("g4d")}</p>
            <div class="game-cta"><span class="tag-soon">${t("soon")}</span></div>
          </div>
        </div>

      </div>

      <div class="lede">
        <p>${t("lede1")}</p>
        <p>${t("lede2")}</p>
      </div>

      <div class="support">
        <h3>${t("supportH")}</h3>
        <p>${t("supportP")}</p>
        <a class="btn" href="https://mfanganogirls.org" target="_blank" rel="noopener">${t("supportBtn")}</a>
      </div>

      <p class="foot">${t("foot")}</p>
    </div>
  `;
  document.getElementById("lang").onclick = () => {
    LANG = LANG === "en" ? "sw" : "en";
    saveLang();
    render();
  };
}

loadLang();
render();
</script>
</body>
</html>
